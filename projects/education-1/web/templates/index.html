<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카프카 AI - 에빙하우스 복습 퀴즈</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎓 카프카 AI</h1>
            <p class="subtitle">에빙하우스 망각 곡선 기반 복습 퀴즈</p>
        </header>

        {% if alert %}
        <div class="alert alert-{{ alert.type }}">{{ alert.message }}</div>
        {% endif %}

        <div class="input-section">
            <label for="url">URL 또는 텍스트 입력</label>
            <input type="text" id="url" name="url" placeholder="https://example.com/article 또는 유튜브 URL 또는 직접 입력할 텍스트" autocomplete="off">
            <div class="btn-group">
                <button type="button" class="btn btn-primary" onclick="processNow()">⚡ 즉시 처리 (바로 퀴즈)</button>
                <button type="button" class="btn btn-secondary" onclick="addToQueue()">📋 대기열에 추가</button>
            </div>
        </div>

        <div class="queue-info">
            <strong>📬 대기 중인 URL:</strong> {{ pending_count }}개
            <br><small>스케줄러가 매일 1개씩 처리합니다. (python -m agent.scheduler.scheduler_service)</small>
        </div>

        <div class="footer-helper">
            <p>지원 형식: 뉴스 기사 URL, 유튜브 URL, 직접 입력 텍스트</p>
            <p>지식형 콘텐츠 → 5문항 퀴즈 생성 | 힐링형 콘텐츠 → 생각 유도 질문</p>
        </div>
    </div>

    <form id="process-form" method="POST" action="/process" style="display:none;">
        <input type="hidden" name="url" id="process-url">
    </form>
    <form id="add-form" method="POST" action="/add-url" style="display:none;">
        <input type="hidden" name="url" id="add-url">
    </form>

    <script>
        function processNow() {
            const val = document.getElementById('url').value.trim();
            if (!val) { alert('URL 또는 텍스트를 입력해주세요.'); return; }
            document.getElementById('process-url').value = val;
            document.getElementById('process-form').submit();
        }
        function addToQueue() {
            const val = document.getElementById('url').value.trim();
            if (!val) { alert('URL 또는 텍스트를 입력해주세요.'); return; }
            document.getElementById('add-url').value = val;
            document.getElementById('add-form').submit();
        }
    </script>
</body>
</html>
